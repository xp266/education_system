

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育系统智能助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='libs/katex.min.css') }}">
    <!-- Markdown 样式 -->
    <style>
        .markdown-body {
            line-height: 1.6;
            word-wrap: break-word;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #000;
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th {
            background-color: transparent;
            color: inherit;
            font-weight: 600;
        }
        .markdown-body tr:nth-child(even) {
            background-color: transparent;
        }
        .markdown-body tr:hover {
            background-color: transparent;
        }
        .markdown-body pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .markdown-body code {
            background-color: #f6f8fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-body blockquote {
            border-left: 4px solid #667eea;
            padding-left: 16px;
            margin: 10px 0;
            color: #666;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .markdown-body ul, .markdown-body ol {
            padding-left: 20px;
            margin: 10px 0;
        }
        .markdown-body li {
            margin: 5px 0;
        }
        .markdown-body a {
            color: #667eea;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        /* 政策内容样式 */
        .markdown-body.policy-content {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 16px;
            max-height: 600px;
            overflow-y: auto;
        }
        .markdown-body.policy-content::-webkit-scrollbar {
            width: 6px;
        }
        .markdown-body.policy-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .markdown-body.policy-content::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        /* KaTeX 公式样式 */
        .markdown-body .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
            padding: 5px 0;
        }
        .markdown-body .katex {
            font-size: 1em;
            max-width: 100%;
        }
        .markdown-body .katex-html {
            overflow-x: auto;
            overflow-y: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar collapsed" id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="btn">+ 新对话</button>
            </div>
            <div class="sidebar-content">
                <div id="conversation-list" class="conversation-list"></div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 顶部导航 -->
            <div class="header">
                <div class="header-left">
                    <button id="sidebar-toggle" class="btn btn-small">☰</button>
                    <h1>教育系统智能助手</h1>
                </div>
                <div class="user-info">
                    <span id="user-display">访客</span>
                    <button id="login-btn" class="btn">登录</button>
                    <button id="logout-btn" class="btn" style="display: none;">退出登录</button>
                </div>
            </div>

            <!-- 聊天区域 -->
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="message ai-message">
                        <div class="message-content">等待服务启动中...请稍后刷新页面</div>
                    </div>
                </div>
                <div class="input-area">
                    <!-- 隐藏的输入框，用于阻止浏览器自动填充 -->
                    <input type="text" name="dummy-username" style="display: none;" />
                    <input type="password" name="dummy-password" style="display: none;" />
                    <button id="clear-btn" class="btn btn-small">清空</button>
                    <input type="text" id="chat-input" name="chat-message" placeholder="请输入你的问题..." autocomplete="off" />
                    <button id="send-btn" class="btn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="modal" id="login-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">×</span>
            <h2>登录</h2>
            <div class="form-group">
                <label for="account">账号（学号/工号）</label>
                <input type="text" id="account" placeholder="请输入学号或工号" />
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" />
            </div>
                <div style="color: #666; font-size: 12px; margin-bottom: 10px;">
                    测试账号：学生：2023001 密码：123456；<br>
                    教师：T001 密码：123456
                </div>
            <div id="login-error" class="error"></div>
            <button id="do-login" class="btn">登录</button>
        </div>
    </div>

    <!-- 登录成功弹窗 -->
    <div class="modal" id="success-modal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h2 class="success-title">登录成功</h2>
            <p class="success-message">欢迎回来！</p>
            <button class="confirm-btn" id="success-ok-btn">确定</button>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <h2 class="confirm-title" id="confirm-title">确认</h2>
            <p class="confirm-message" id="confirm-message">确定要执行此操作吗？</p>
            <div class="confirm-buttons">
                <button class="cancel-btn" id="confirm-cancel-btn">取消</button>
                <button class="confirm-btn" id="confirm-ok-btn">确定</button>
            </div>
        </div>
    </div>

    <!-- 政策详情弹窗 -->
    <div class="modal policy-detail-modal" id="policy-detail-modal">
        <div class="modal-content">
            <span class="close-btn" id="policy-detail-close">×</span>
            <h2>学生手册详情</h2>
            <div class="policy-detail-content markdown-body" id="policy-detail-content"></div>
        </div>
    </div>

    <!-- Markdown 渲染库 -->
    <script src="{{ url_for('static', filename='libs/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='libs/katex.min.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
